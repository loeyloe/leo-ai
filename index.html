<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Leo AI Landing Page</title>\n    <style>\n        body {\n            margin: 0;\n            font-family: Arial, sans-serif;\n            background-color: #121212;\n            color: #ffffff;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            height: 100vh;\n        }\n        .hero {\n            background: rgba(255, 255, 255, 0.1);\n            border-radius: 20px;\n            padding: 20px;\n            backdrop-filter: blur(10px);\n            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);\n            animation: fadeIn 1s;\n        }\n        @keyframes fadeIn {\n            from { opacity: 0; }\n            to { opacity: 1; }\n        }\n        .tabs {\n            display: flex;\n            margin: 20px 0;\n        }\n        .tab {\n            background: rgba(255, 255, 255, 0.2);\n            border-radius: 10px;\n            padding: 10px 20px;\n            margin: 0 10px;\n            cursor: pointer;\n            transition: transform 0.3s;\n        }\n        .tab:hover { transform: scale(1.05); }\n        .dashboard {\n            display: flex;\n            flex-direction: column;\n            width: 80%;\n            margin: 20px auto;\n        }\n        .flashcard, .quiz {\n            background: rgba(255, 255, 255, 0.2);\n            border-radius: 10px;\n            padding: 20px;\n            margin: 10px 0;\n        }\n    </style>\n</head>\n<body>\n    <div class=\"hero\">\n        <h1>Welcome to Leo AI</h1>\n        <p>Your AI-powered study companion.</p>\n        <div class=\"tabs\">\n            <div class=\"tab\">Upload</div>\n            <div class=\"tab\">Dashboard</div>\n        </div>\n    </div>\n    <div class=\"dashboard\">\n        <div class=\"flashcard\">Flashcard Section</div>\n        <div class=\"quiz\">Quiz Section</div>\n    </div>\n    <script>\n        // JavaScript for animations and functionality\n        document.querySelectorAll('.tab').forEach(tab => {\n            tab.addEventListener('click', () => {\n                alert('Tab clicked: ' + tab.textContent);\n            });\n        });\n    </script>\n</body>\n</html>\n
